<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wer freut sich auf morgen?</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f7ff;
        padding-top: 100px;
    }

    h1 {
        color: #333;
    }

    .container {
        position: relative;
        width: 100%;
        height: 300px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        transition: 0.2s;
    }

    #rebekka {
        background: #4CAF50;
        color: white;
    }

    #thomas {
        background: #ff5252;
        color: white;
        position: absolute;
    }

    #message {
        margin-top: 40px;
        font-size: 24px;
        color: #4CAF50;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>Wer freut sich auf morgen? 🎉</h1>

<div class="container">
    <button id="rebekka">Rebekka</button>
    <button id="thomas">Thomas</button>
</div>

<div id="message"></div>

<script>
const thomasBtn = document.getElementById("thomas");

function moveButton() {
    const maxX = window.innerWidth - 150;
    const maxY = 250;

    thomasBtn.style.left = Math.random() * maxX + "px";
    thomasBtn.style.top = Math.random() * maxY + "px";
}

thomasBtn.addEventListener("mouseover", moveButton);
thomasBtn.addEventListener("click", moveButton);

document.getElementById("rebekka").addEventListener("click", () => {
    document.getElementById("message").innerHTML =
        "💖 Natürlich Rebekka! Ich wünsche dir einen wunderschönen Tag morgen voller Freude, guter Laune und vieler schöner Momente! 🌸✨";
});

moveButton();
</script>

</body>
</html>
