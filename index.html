<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wer ist die Beste?</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    width:600px;
    max-width:90%;
}

h1{
    color:#d63384;
    margin-bottom:30px;
}

.slot-machine{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:30px 0;
}

.slot{
    width:160px;
    height:80px;
    border:4px solid #d63384;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    background:#fff8fb;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    background:#d63384;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

#result{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
    color:#d63384;
}

.confetti{
    position:fixed;
    font-size:30px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Wer ist die Beste? ❤️</h1>

    <div class="slot-machine">
        <div class="slot" id="slot1">?</div>
        <div class="slot" id="slot2">?</div>
        <div class="slot" id="slot3">?</div>
    </div>

    <button onclick="spin()">🎰 Drehen</button>

    <div id="result"></div>
</div>

<script>

const names = [
"Anna",
"Julia",
"Sophie",
"Marie",
"Katharina",
"Lisa",
"Laura"
];

let spins = 0;

function randomName(){
    return names[Math.floor(Math.random()*names.length)];
}

function spin(){

    spins++;

    const slot1 = document.getElementById("slot1");
    const slot2 = document.getElementById("slot2");
    const slot3 = document.getElementById("slot3");
    const result = document.getElementById("result");

    result.innerHTML = "";

    let counter = 0;

    const animation = setInterval(() => {

        slot1.textContent = randomName();
        slot2.textContent = randomName();
        slot3.textContent = randomName();

        counter++;

        if(counter > 15){

            clearInterval(animation);

            if(spins >= 3){

                slot1.textContent = "Rebekka";
                slot2.textContent = "Rebekka";
                slot3.textContent = "Rebekka";

                result.innerHTML =
                "🎉 JACKPOT 🎉<br><br>" +
                "🥇 Rebekka<br>" +
                "🥈 Rebekka<br>" +
                "🥉 Rebekka<br><br>" +
                "Die Auswertung war überraschend eindeutig. ❤️";

                confetti();

            }else{

                slot1.textContent = randomName();
                slot2.textContent = randomName();
                slot3.textContent = randomName();

                result.innerHTML =
                "Hmm... die Jury berät noch. 🤔";
            }
        }

    },100);
}

function confetti(){

    for(let i=0;i<40;i++){

        const c = document.createElement("div");
        c.className = "confetti";
        c.innerHTML = ["🎉","❤️","✨","🥳"][Math.floor(Math.random()*4)];

        c.style.left = Math.random()*100 + "vw";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },3000);
    }
}

</script>

</body>
</html>
