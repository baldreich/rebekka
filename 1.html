<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Frage</title>
<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        margin-top: 100px;
    }

    #container {
        position: relative;
        width: 600px;
        height: 400px;
        margin: auto;
    }

    button {
        padding: 15px 30px;
        font-size: 20px;
        cursor: pointer;
    }

    #yesBtn {
        position: absolute;
        left: 200px;
        top: 200px;
    }

    #noBtn {
        position: absolute;
        left: 350px;
        top: 200px;
    }
</style>
</head>
<body>

<h1>Willst du mit mir ausgehen? ❤️</h1>

<div id="container">
    <button id="yesBtn" onclick="alert('Super! 😊')">Ja</button>
    <button id="noBtn">Nein</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const container = document.getElementById("container");

noBtn.addEventListener("mouseover", () => {
    const maxX = container.clientWidth - noBtn.offsetWidth;
    const maxY = container.clientHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
});
</script>

</body>
</html>
